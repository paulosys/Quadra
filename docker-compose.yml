version: "3.9"

services:
  quadra:
    build: .
    container_name: quadra
    restart: always
    env_file: .env
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"   # HTTP — página do jogo
      - "${WS_PORT:-8765}:${WS_PORT:-8765}"        # WebSocket — servidor do jogo
    volumes:
      - ./backend:/app
      - ./frontend:/app/static
    command: ["python", "-m", "watchfiles", "--filter", "python", "python entrypoint.py", "/app"]
